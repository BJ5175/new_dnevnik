<!DOCTYPE html>
<html lang="hr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Dnevnik | Učenik</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #DB7093 70%, #4A7F2C 100%);
            padding: 15px;
            /* Smanjeno za mobitele */
            min-height: 100vh;
            color: #fff;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 25px;
            /* Smanjeno da stane na ekran */
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .tab {
            display: flex;
            gap: 5px;
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.15);
            padding: 5px;
            border-radius: 18px;
        }

        .tab button {
            flex: 1;
            padding: 12px 2px;
            border: none;
            cursor: pointer;
            border-radius: 14px;
            background: transparent;
            color: #fff;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .tab button.active {
            background: #fff;
            color: #764ba2;
        }

        .tabcontent {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .grade-item {
            display: flex;
            align-items: center;
            padding: 14px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .grade-circle {
            width: 38px;
            height: 38px;
            min-width: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #764ba2;
            background: #fff;
        }

        .grade-info {
            flex-grow: 1;
            margin-left: 15px;
            font-size: 0.9rem;
        }

        /* POPRAVLJENA TABLICA ZA MOBITEL */
        .stats-table {
            width: 100%;
            table-layout: fixed;
            /* Forsira da kolone budu jednake i ne šire se van ekrana */
            border-collapse: separate;
            border-spacing: 0;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stats-table th,
        .stats-table td {
            padding: 12px 5px;
            text-align: center;
            word-wrap: break-word;
            /* Sprečava pucanje teksta */
        }

        .stats-table th {
            background: rgba(0, 0, 0, 0.1);
            font-size: 0.65rem;
            /* Smanjeno da stane u jedan red */
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            opacity: 0.8;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stats-table td {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .summary-box {
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 22px;
            text-align: center;
        }

        .avg-large {
            font-size: 2.5rem;
            font-weight: 900;
            color: #ff9a9e;
        }

        .logout {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.9rem;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: #fff;
            color: #333;
            margin: 20% auto;
            padding: 25px;
            border-radius: 25px;
            width: 85%;
            max-width: 350px;
            text-align: center;
        }

        .big-circle {
            width: 60px;
            height: 60px;
            background: #764ba2;
            color: #fff;
            font-size: 1.8rem;
            font-weight: 900;
            border-radius: 50%;
            margin: 0 auto 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-desc {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 15px;
            font-style: italic;
            font-size: 0.9rem;
        }

        .close-btn {
            display: block;
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: #764ba2;
            color: #fff;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <h1 id="imeUcenika">Pregled</h1>
            <p style="font-size: 0.8rem; opacity: 0.8;">Učenički portal e-Dnevnik</p>
        </div>

        <div class="tab">
            <button class="tablinks active" onclick="openTab(event,'ocjene')">Ocjene</button>
            <button class="tablinks" onclick="openTab(event,'biljeske')">Bilješke</button>
            <button class="tablinks" onclick="openTab(event,'ostalo')">Ostalo</button>
        </div>

        <div id="ocjene" class="tabcontent" style="display:block;">
            <div id="listaOcjena"></div>
            <div class="summary-box">
                <span style="font-size: 0.8rem;">Ukupni prosjek</span>
                <div class="avg-large" id="prosjek">0.00</div>
            </div>
        </div>

        <div id="biljeske" class="tabcontent">
            <div id="listaBiljeski"></div>
        </div>

        <div id="ostalo" class="tabcontent">
            <table class="stats-table">
                <thead>
                    <tr>
                        <th>IZOSTANCI</th>
                        <th>NEGATIVNE</th>
                        <th>VLADANJE</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td id="brojIzostanaka">0</td>
                        <td id="brojNegativnih" style="color: #c46565;">0</td>
                        <td id="brojVladanje">5</td>
                    </tr>
                </tbody>
            </table>

            <div id="listaIzostanaka"></div>
        </div>

        <a href="index.html" class="logout">Sigurna odjava iz sustava</a>
    </div>

    <div id="detaljModal" class="modal">
        <div class="modal-content">
            <div id="modalKrug" class="big-circle">5</div>
            <h3 style="margin-bottom: 10px; color: #764ba2;">Detalji zapisa</h3>
            <div id="modalOpis" class="modal-desc"></div>
            <button class="close-btn" onclick="zatvoriModal()">Zatvori</button>
        </div>
    </div>

    <script src="ocjene_i_ostalo.js"></script>

    <script>
        const user = localStorage.getItem("currentUser");
        const ucenik = bazaUcenika[user];

        if (!ucenik) { window.location.href = "index.html"; }

        document.getElementById("imeUcenika").textContent = "Pregled za: " + ucenik.ime;

        const modal = document.getElementById("detaljModal");

        function prikaziModal(oznaka, tekst) {
            document.getElementById("modalKrug").textContent = oznaka;
            document.getElementById("modalKrug").style.background = (oznaka === "i") ? "#f39c12" : "#764ba2";
            document.getElementById("modalOpis").textContent = tekst;
            modal.style.display = "block";
        }

        function zatvoriModal() { modal.style.display = "none"; }
        window.onclick = (e) => { if (e.target == modal) zatvoriModal(); }

        const listaOcjena = document.getElementById("listaOcjena");
        const listaBiljeski = document.getElementById("listaBiljeski");
        const listaIzostanaka = document.getElementById("listaIzostanaka");

        let suma = 0, broj = 0, negativne = 0;

        ucenik.podaci.forEach(o => {
            const div = document.createElement("div");
            div.className = "grade-item";

            if (o.ocjena) {
                const ocjenaNum = Number(o.ocjena);
                suma += ocjenaNum;
                broj++;
                if (ocjenaNum === 1) negativne++;

                div.innerHTML = `<div class="grade-circle">${ocjenaNum}</div><div class="grade-info">${o.opis}</div>`;
                div.onclick = () => prikaziModal(ocjenaNum, o.opis);
                listaOcjena.appendChild(div);
            } else {
                div.innerHTML = `<div class="grade-circle" style="background:#f39c12; color:white">i</div><div class="grade-info">${o.opis}</div>`;
                div.onclick = () => prikaziModal("i", o.opis);
                listaBiljeski.appendChild(div);
            }
        });

        document.getElementById("prosjek").textContent = broj ? (suma / broj).toFixed(2) : "0.00";
        document.getElementById("brojNegativnih").textContent = negativne;
        document.getElementById("brojVladanje").textContent = ucenik.vladanje || "5";

        const iz = ucenik.izostanci || [];
        document.getElementById("brojIzostanaka").textContent = iz.length;

        iz.forEach((i, index) => {
            const div = document.createElement("div");
            div.className = "grade-item";
            div.innerHTML = `<div class="grade-circle" style="background:rgba(255,255,255,0.2);color:#fff">${index + 1}</div><div class="grade-info"><b>${i.datum}</b><br>${i.razlog}</div>`;
            div.onclick = () => prikaziModal("D", `${i.datum}: ${i.razlog}`);
            listaIzostanaka.appendChild(div);
        });

        function openTab(evt, tabName) {
            const tabcontent = document.getElementsByClassName("tabcontent");
            const tablinks = document.getElementsByClassName("tablinks");
            for (let i = 0; i < tabcontent.length; i++) tabcontent[i].style.display = "none";
            for (let i = 0; i < tablinks.length; i++) tablinks[i].classList.remove("active");
            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.classList.add("active");
        }
    </script>
</body>

</html>
