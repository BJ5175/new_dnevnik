<!DOCTYPE html>
<html lang="hr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>e-Dnevnik | Prijava</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
        }

        /* Dekorativni krugovi u pozadini za dubinu */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            z-index: -1;
        }
        body::before { top: -50px; left: -50px; }
        body::after { bottom: -50px; right: -50px; }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 3rem 2.5rem;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            color: #fff;
            text-align: center;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 90px;
            height: auto;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.95rem;
            opacity: 0.7;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        .field {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .field label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.6rem;
            margin-left: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.8;
        }

        .field input {
            width: 100%;
            padding: 1rem 1.2rem;
            border-radius: 15px;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            font-size: 1rem;
            color: #fff;
            transition: all 0.3s ease;
        }

        .field input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .field input:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 1.1rem;
            border-radius: 15px;
            border: none;
            margin-top: 1rem;
            background: #fff;
            color: #764ba2;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.2);
            background: #f8f9fa;
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error {
            margin-top: 1.2rem;
            font-size: 0.85rem;
            padding: 0.8rem;
            border-radius: 10px;
            background: rgba(255, 71, 87, 0.2);
            border: 1px solid rgba(255, 71, 87, 0.3);
            color: #ffdae0;
            display: none;
        }

        /* Responsive */
        @media (max-width: 400px) {
            .login-card {
                padding: 2rem 1.5rem;
                margin: 15px;
            }
        }
    </style>
</head>

<body>

    <div class="login-card">
        <img src="e-dnevnik-logo.png" alt="Logo" class="logo" />
        <h1>e-Dnevnik</h1>
        <div class="subtitle">Dobrodošli natrag! Prijavite se u sustav.</div>

        <div class="field">
            <label for="username">Korisničko ime</label>
            <input id="username" type="text" placeholder="Primjer: Ime.Prezime" />
        </div>

        <div class="field">
            <label for="password">Lozinka</label>
            <input id="password" type="password" placeholder="••••••••" />
        </div>

        <button class="login-btn" id="loginBtn">Prijavi se</button>

        <div class="error" id="errorMsg">⚠️ Korisničko ime ili lozinka nisu ispravni.</div>
    </div>

    <script src="ocjene_i_ostalo.js"></script>

    <script>
        document.getElementById('loginBtn').addEventListener('click', () => {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const error = document.getElementById('errorMsg');

            if (error) error.style.display = 'none';

            // 1. Nastavnik
            if (user === 'Prof.Boris' && pass === '2805') {
                localStorage.setItem('currentUser', 'Prof.Boris');
                window.location.href = 'nastavnik.html';
                return;
            }

            // 2. Učenik
            if (typeof bazaUcenika !== 'undefined' && bazaUcenika[user] && pass === 'ucenik123') {
                localStorage.setItem('currentUser', user);
                localStorage.setItem('userRole', 'učenik');
                window.location.href = 'ucenik.html';
                return;
            }

            // 3. Roditelj
            let pronadjeniKljuc = null;
            if (typeof bazaUcenika !== 'undefined') {
                for (let kljuc in bazaUcenika) {
                    if (bazaUcenika[kljuc].prezime === user) {
                        pronadjeniKljuc = kljuc;
                        break;
                    }
                }
            }

            if (pronadjeniKljuc && pass === 'roditelj123') {
                localStorage.setItem('currentUser', pronadjeniKljuc);
                localStorage.setItem('userRole', 'roditelj');
                window.location.href = 'roditelj.html';
                return;
            }

            if (error) error.style.display = 'block';
        });
    </script>
</body>

</html>
